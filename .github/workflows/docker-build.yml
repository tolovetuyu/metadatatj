name: Build and Push Multi-Arch Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # 允许手动触发

env:
  REGISTRY: "crpi-zzqrsg0sczeik6kc.cn-hangzhou.personal.cr.aliyuncs.com"
  NAMESPACE: "metadatatj"        # 命名空间保持不变
  IMAGE_NAME: "metadataj01"      # 阿里云仓库名

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64, linux/arm64   # 关键：同时构建两个架构
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest