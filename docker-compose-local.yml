# 本地向量模型服务 + 主服务 Docker Compose 配置
# 用于内网环境无外网连接的场景

version: '3.8'

services:
  # 本地向量模型服务
  embedding-service:
    build:
      context: ./embedding_service
      dockerfile: Dockerfile
    container_name: embedding-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # 模型缓存目录（避免每次重启重新下载模型）
      - embedding-cache:/root/.cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # 主推荐服务
  metadatatj:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: metadatatj
    restart: unless-stopped
    ports:
      - "7058:7058"
      - "7059:7059"
      - "7060:7060"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./knowledge:/app/knowledge
    environment:
      # 使用本地向量服务
      - EMBEDDING_API_BASE=http://embedding-service:8000/v1
      - EMBEDDING_API_KEY=local
      - EMBEDDING_MODEL=BAAI/bge-base-zh-v1.5
      - EMBEDDING_BATCH_SIZE=10
      # 其他配置从 .env 文件读取
    env_file:
      - .env
    depends_on:
      embedding-service:
        condition: service_healthy
    extra_hosts:
      # 确保 embedding-service 可以通过容器名访问
      - "embedding-service:127.0.0.1"

volumes:
  # 模型缓存卷
  embedding-cache: